<!DOCTYPE html>
<html>
  <head>
    <title>TG1-1 チームMATRIX</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Satisfy&family=Stoke&family=Yellowtail&family=Geo&family=Oswald&family=Lobster&family=Cookie&family=Chewy&family=Limelight&family=Sacramento&family=Plaster&display=swap" rel="stylesheet">

  <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Oswald", sans-serif;
}

body {
  background: linear-gradient(135deg, #fde68a, #fbcfe8);
}

.container {
  max-width: 960px;
  margin: 40px auto;
  background: #fffaf0;
  border-radius: 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  overflow: hidden;
}

.header {
  height: 100px;
  color: white;
  font-size: 36px;
  text-align: center;
  line-height: 100px;
  font-family: "Chewy", cursive;
  letter-spacing: 2px;

  background-image:
    linear-gradient(90deg,
      #fb7185 0%,
      #f472b6 45%,
      rgba(244,114,182,0.7) 65%,
      rgba(244,114,182,0.0) 100%
    ),
    url("img/hoyu.png");

  background-size: cover;
  background-position: right center;
  background-repeat: no-repeat;
}

.main {
  padding: 30px;
  min-height: 400px;
}

.hooter {
  height: 50px;
  background: #fb7185;
  color: white;
  font-size: 14px;
  text-align: right;
  padding: 15px 20px;
}

.difficulty-buttons {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 60px;
}

.difficulty-button {
  padding: 18px 30px;
  font-size: 20px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
  background: linear-gradient(135deg, #a78bfa, #38bdf8);
  color: white;
  box-shadow: 0 5px 0 rgba(0,0,0,0.2);
  transition: 0.2s;
}

.difficulty-button:hover {
  opacity: 0.9;
}

.difficulty-button:active {
  transform: translateY(4px);
  box-shadow: 0 2px 0 rgba(0,0,0,0.2);
}
  </style>
</head>

<body>

<div class="container">

  <div class="header">
    クロスワードパズル
  </div>

  <div class="main">
    <p style="text-align:center; font-size:18px;">
      難易度を選んで！
    </p>

    <div class="difficulty-buttons">
      <button class="difficulty-button" onclick="location.href='normal.html'">ふつう</button>
      <button class="difficulty-button" onclick="location.href='difficult.html'">むずかしい</button>
    </div>
  </div>

  <div class="hooter">
    01阿部 02新井 15中島 20二宮
  </div>

</div>

<!-- 確認用 -->


<script>
  
</script>

</body>
</html>
